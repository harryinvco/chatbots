<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICPAC Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; background: #f9fafb; }
    .chat { display: flex; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; background: #fff; box-shadow: 0 0 40px rgba(0,0,0,.08); }
    .header { background: #1a56db; color: #fff; padding: 20px 24px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p { font-size: 13px; opacity: .85; margin-top: 2px; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; }
    .msg.bot { background: #f1f3f4; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.bot ul, .msg.bot ol { margin: 4px 0; padding-left: 20px; }
    .msg.bot li { margin: 2px 0; }
    .msg.bot strong { font-weight: 600; }
    .msg.bot a { color: #1a56db; }
    .msg.bot p { margin: 6px 0; }
    .msg.bot p:first-child { margin-top: 0; }
    .msg.bot p:last-child { margin-bottom: 0; }
    .sources { margin-top: 10px; padding-top: 8px; border-top: 1px solid #e2e5e9; font-size: 12.5px; color: #6b7280; }
    .sources a { display: inline-block; margin: 2px 6px 2px 0; color: #1a56db; text-decoration: none; }
    .sources a:hover { text-decoration: underline; }
    .msg.user { background: #1a56db; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.typing { display: flex; gap: 5px; padding: 16px 20px; }
    .msg.typing span { width: 8px; height: 8px; background: #90949c; border-radius: 50%; animation: dot 1.4s infinite; }
    .msg.typing span:nth-child(2) { animation-delay: .2s; }
    .msg.typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .input-area { padding: 16px 24px 24px; border-top: 1px solid #e5e7eb; display: flex; gap: 12px; }
    .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; outline: none; }
    .input-area input:focus { border-color: #1a56db; }
    .input-area button { background: #1a56db; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 500; cursor: pointer; }
    .input-area button:hover { background: #1e429f; }
    .input-area button:disabled { background: #9ca3af; cursor: not-allowed; }
    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
    .welcome h2 { font-size: 22px; margin-bottom: 12px; color: #1f2937; }
    .welcome p { color: #6b7280; font-size: 16px; max-width: 400px; }
    @media (max-width: 640px) { .msg { max-width: 90%; } .input-area { padding: 12px 16px 16px; } }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header"><h1>ICPAC Assistant</h1><p>Institute of Certified Public Accountants of Cyprus</p></div>
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>Welcome</h2>
        <p>Ask me anything about ICPAC — membership and registration, the accountancy &amp; audit profession in Cyprus, regulations, CPD, events, forms, and more.</p>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="input" placeholder="Type your message..." autofocus>
      <button id="send">Send</button>
    </div>
  </div>
  <script>
    var API_URL = '/api/chat';
    var history = [];        // [{role:'user'|'assistant', content}]
    var isLoading = false;
    var started = false;

    var messagesEl = document.getElementById('messages');
    var welcome = document.getElementById('welcome');
    var input = document.getElementById('input');
    var sendBtn = document.getElementById('send');

    input.onkeypress = function(e) { if (e.key === 'Enter') send(); };
    sendBtn.onclick = send;

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Minimal, safe markdown -> HTML (bold/italic, links, bullet & numbered lists, paragraphs).
    function formatMarkdown(text) {
      var s = escapeHtml(text);
      s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/(^|[^*])\*(?!\s)([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');
      s = s.replace(/^[\t ]*\d+\.\s+(.+)$/gm, '<oli>$1</oli>');
      s = s.replace(/^[\t ]*[-•]\s+(.+)$/gm, '<li>$1</li>');
      s = s.replace(/(<oli>[\s\S]*?<\/oli>)/g, function(m){ return '<ol>' + m.replace(/oli>/g,'li>') + '</ol>'; });
      s = s.replace(/<\/ol>\s*<ol>/g, '');
      s = s.replace(/(<li>[\s\S]*?<\/li>)/g, function(m){ return '<ul>' + m + '</ul>'; });
      s = s.replace(/<\/ul>\s*<ul>/g, '');
      // paragraphs from blank lines
      s = s.split(/\n{2,}/).map(function(b){
        if (/^\s*<(ul|ol)>/.test(b)) return b;
        return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
      }).join('');
      return s;
    }

    function bubble(type) {
      if (!started) { welcome.style.display = 'none'; started = true; }
      var div = document.createElement('div');
      div.className = 'msg ' + type;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function renderSources(el, sources) {
      if (!sources || !sources.length) return;
      var wrap = document.createElement('div');
      wrap.className = 'sources';
      wrap.innerHTML = 'Sources: ' + sources.map(function(s){
        return '<a href="' + encodeURI(s.url) + '" target="_blank" rel="noopener">' + escapeHtml(s.title || s.url) + '</a>';
      }).join('');
      el.appendChild(wrap);
    }

    function send() {
      var text = input.value.trim();
      if (!text || isLoading) return;
      bubble('user').textContent = text;
      history.push({ role: 'user', content: text });
      input.value = '';
      isLoading = true;
      sendBtn.disabled = true;

      var typing = bubble('bot');
      typing.classList.add('typing');
      typing.innerHTML = '<span></span><span></span><span></span>';

      streamChat(typing);
    }

    function streamChat(botEl) {
      var acc = '';
      var sources = null;
      var contentEl = null;

      function ensureContent() {
        if (!contentEl) {
          botEl.classList.remove('typing');
          botEl.innerHTML = '';
          contentEl = document.createElement('div');
          botEl.appendChild(contentEl);
        }
      }

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history.slice(-12) })
      }).then(function(resp) {
        if (!resp.ok || !resp.body) throw new Error('bad response');
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buf = '';

        function pump() {
          return reader.read().then(function(res) {
            if (res.done) return finish();
            buf += decoder.decode(res.value, { stream: true });
            var parts = buf.split('\n\n');
            buf = parts.pop();
            parts.forEach(handleEvent);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return pump();
          });
        }

        function handleEvent(block) {
          var event = null, dataLines = [];
          block.split('\n').forEach(function(line) {
            if (line.indexOf('event:') === 0) event = line.slice(6).trim();
            else if (line.indexOf('data:') === 0) dataLines.push(line.slice(5).trim());
          });
          if (!dataLines.length) return;
          var payload;
          try { payload = JSON.parse(dataLines.join('\n')); } catch (e) { return; }
          if (event === 'sources') { sources = payload; return; }
          if (payload.error) { ensureContent(); contentEl.innerHTML = formatMarkdown(payload.error); return; }
          if (payload.delta) { acc += payload.delta; ensureContent(); contentEl.innerHTML = formatMarkdown(acc); }
          if (payload.done) finish();
        }

        function finish() {
          ensureContent();
          contentEl.innerHTML = formatMarkdown(acc || '…');
          renderSources(botEl, sources);
          if (acc) history.push({ role: 'assistant', content: acc });
          isLoading = false; sendBtn.disabled = false; input.focus();
        }

        return pump();
      }).catch(function() {
        botEl.classList.remove('typing');
        botEl.innerHTML = 'Sorry, something went wrong. Please try again.';
        isLoading = false; sendBtn.disabled = false; input.focus();
      });
    }
  </script>
</body>
</html>
